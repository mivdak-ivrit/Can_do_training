<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  databaseURL: "https://can-do-workflow-default-rtdb.europe-west1.firebasedatabase.app/"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const dataRef = ref(db, 'workflow');

// State
const comments={};
const approvals={};
const openReminders={};
const dashOpen={};
let view='dashboard',current=0,activeTab='';
let syncing=false;

// Listen to Firebase changes in real time
onValue(dataRef, (snapshot) => {
  const data = snapshot.val() || {};
  // Update local state from Firebase
  Object.keys(comments).forEach(k=>delete comments[k]);
  Object.keys(approvals).forEach(k=>delete approvals[k]);
  if(data.comments) Object.assign(comments, data.comments);
  if(data.approvals) Object.assign(approvals, data.approvals);
  render();
  // Show sync indicator
  showSyncIndicator();
});

function saveToFirebase(){
  set(dataRef, {
    comments: {...comments},
    approvals: {...approvals},
    lastUpdated: new Date().toISOString()
  });
}

function showSyncIndicator(){
  const el = document.getElementById('sync-indicator');
  if(el){ el.style.opacity='1'; setTimeout(()=>{ if(el) el.style.opacity='0'; },1500); }
}

ight:600;">google maps</a>) (<a href="https://www.waze.com/live-map/directions" style="color:#0E7C7B;font-weight:600;">waze</a>)</p><p style="margin:6px 0 0;font-size:13px;color:#6b7280;">חנייה חינם במקום, נגישות גבוהה בתחבורה ציבורית.</p></div><p>לכל שאלה: <a href="mailto:can_do@safa1.co.il" style="color:#0E7C7B;font-weight:600;">can_do@safa1.co.il</a></p><p class="email-sig">מתרגשים ושמחים לצאת לדרך,<br>צוות שפה אחת ו-Do.ability</p>`},

  {num:5,title:"לאחר התשלום",desc:"אישור ופרטי הכשרה מלאים למשתתפים ששילמו",tabs:['yes'],
    yes:{subject:"התשלום הוסדר – כיף שנרשמת!",body:`<p>שלום רב,</p><p>התשלום הוסדר, כיף שנרשמת! אנחנו שמחים מאוד שאת/ה מצטרף/ת אלינו לתכנית הכשרת המורים בשיטת המסוגלות של Do.ability ו-שפה1.</p><div class="email-hl"><div style="margin-bottom:8px;">📅 <strong>תאריכי המפגשים:</strong> 19–22.7 ו-26–29.7 (ימים א׳–ד׳)</div><div style="margin-bottom:8px;">🕘 <strong>שעות:</strong> 9:30–14:00 (נא להגיע מוקדם)</div><div>📍 <strong>מיקום:</strong> מכון מופ"ת, רח׳ שושנה פרסיץ 13, תל אביב</div></div><p>בימים הקרובים נחזור אליכם עם הנחיות נוספות כיצד להתכונן לקורס.</p><p class="email-sig">מחכים לראותך,<br>צוות תכנית ההכשרה</p>`},

function getStatus(si,t){
  const k=si+'-'+t;
  if(approvals[k]) return 'approved';
  if(comments[k]&&comments[k].trim()) return 'comment';
  return 'pending';
}

function getAllEmailKeys(){
  const keys=[];
  stages.forEach((s,si)=>s.tabs.forEach(t=>keys.push({si,t})));
  return keys;
}

function renderDashboard(){
  const all=getAllEmailKeys();
  const approved=all.filter(({si,t})=>getStatus(si,t)==='approved').length;
  const withComment=all.filter(({si,t})=>getStatus(si,t)==='comment').length;
  const pending=all.filter(({si,t})=>getStatus(si,t)==='pending').length;

  let h=`<div class="dash-title">סטטוס אישורי מיילים – הכשרת מסוגלות 2026</div>
  <div class="dash-sub">לחצי על שלב לפירוט · לחצי "עבור למייל" לעריכה ואישור</div>
  <div class="dash-stats">
    <div class="stat-card sc-green"><div class="stat-num">${approved}</div><div class="stat-lbl">אושרו ✓</div></div>
    <div class="stat-card sc-amber"><div class="stat-num">${withComment}</div><div class="stat-lbl">עם הערות 💬</div></div>
    <div class="stat-card sc-red"><div class="stat-num">${pending}</div><div class="stat-lbl">ממתינים ⏳</div></div>
  </div>
  <div class="dash-list">`;

  stages.forEach((s,si)=>{
    const allApproved=s.tabs.every(t=>getStatus(si,t)==='approved');
    const anyComment=s.tabs.some(t=>getStatus(si,t)==='comment');
    h+=`<div class="dash-card">
      <div class="dash-card-hdr" onclick="dashOpen[${si}]=!dashOpen[${si}];document.getElementById('db${si}').className='dash-card-body'+(dashOpen[${si}]?' open':'')">
        <div class="dash-card-left">
          <div class="dash-num">${s.num}</div>
          <div class="dash-name">${s.title}</div>
        </div>
        <div class="pills">`;
    s.tabs.forEach(t=>{
      const st=getStatus(si,t);
      const lbl={yes:'מתקדם',no:'לא מתקדם',auto:'אוטומטי'}[t];
      if(st==='approved') h+=`<span class="pill pill-ok">✓ ${lbl}</span>`;
      else if(st==='comment') h+=`<span class="pill pill-cmt">💬 ${lbl}</span>`;
      else h+=`<span class="pill pill-pend">${lbl}</span>`;
    });
    h+=`</div></div>
      <div class="dash-card-body" id="db${si}">`;
    s.tabs.forEach(t=>{
      const st=getStatus(si,t);
      const lbl={yes:'מייל מתקדם',no:'מייל לא מתקדם',auto:'מייל אוטומטי'}[t];
      const stTxt=st==='approved'?'✓ אושר על ידי חיה':st==='comment'?'💬 יש הערה':'⏳ ממתין לאישור';
      const stColor=st==='approved'?'#065f46':st==='comment'?'#92400e':'#9ca3af';
      h+=`<div class="dash-row"><span>${lbl} — <span style="color:${stColor}">${stTxt}</span></span><button class="dash-go" onclick="current=${si};activeTab='${t}';view='stage';render()">עבור למייל</button></div>`;
    });
    h+=`</div></div>`;
  });

  if(pending===0){
    const hasComments=Object.values(comments).some(v=>v&&v.trim());
    h+=`<button class="dash-done" onclick="sendSummary()"><i class="ti ti-send"></i> ${hasComments?'שלח סיכום הערות':'כל המיילים אושרו — שלח אישור'}</button>`;
  } else {
    h+=`<div class="dash-pending-note">נותרו ${pending} מיילים שטרם אושרו או הוענות עליהם</div>`;
  }

  h+=`</div>`;
  document.getElementById('app').innerHTML=h;
}

function approveEmail(key){approvals[key]=true;saveToFirebase();render();}
function unapproveEmail(key){delete approvals[key];saveToFirebase();render();}

function saveComment(key,val){
  comments[key]=val;
  saveToFirebase();
  const sk=key.replace(/[^a-z0-9]/gi,'_');
  const el=document.getElementById('saved-'+sk);
  if(el){el.style.display='flex';setTimeout(()=>{if(el)el.style.display='none';},2000);}
  render();
}

function showWarn(id){
  const w=document.getElementById(id);
  if(w){w.style.display='block';setTimeout(()=>{if(w)w.style.display='none';},3000);}
}

function checkAndGoNext(){
  const k=commentKey();
  if(!approvals[k]&&(!comments[k]||!comments[k].trim())){
    showWarn('warn-'+k.replace(/[^a-z0-9]/gi,'_'));
    return;
  }
  if(current<stages.length-1){current++;activeTab='';render();}
  else{view='dashboard';render();}
}

function sendSummary(){
  const lines=[];
  stages.forEach((s,si)=>{
    s.tabs.forEach(t=>{
      const k=si+'-'+t;
      if(comments[k]&&comments[k].trim()){
        const lbl={yes:'מתקדם',no:'לא מתקדם',auto:'אוטומטי'}[t];
        lines.push('שלב '+s.num+' – '+s.title+' ('+lbl+'):\n'+comments[k].trim());
      }
    });
  });
  alert(lines.length?'סיכום הערות חיה:\n\n'+lines.join('\n\n'):'כל המיילים אושרו ללא הערות על ידי חיה.');
}

function actionBlock(key){
  const sk=key.replace(/[^a-z0-9]/gi,'_');
  const isApproved=!!approvals[key];
  const val=comments[key]||'';
  const hasVal=val.trim().length>0;

  let h=`<div class="action-area">
    <div class="action-row">`;
  if(isApproved){
    h+=`<button class="approve-btn approved" disabled><i class="ti ti-check"></i> אושר על ידי חיה</button>
        <button class="unapprove-btn" onclick="unapproveEmail('${key}')">בטל אישור</button>`;
  } else {
    h+=`<button class="approve-btn" onclick="approveEmail('${key}')"><i class="ti ti-check"></i> אישור של חיה</button>
        <span class="warn-msg" id="warn-${sk}">יש ללחוץ אישור, או להוסיף הערה</span>`;
  }
  h+=`</div>`;

  if(!isApproved){
    h+=`<div class="comment-box">
      <div class="comment-hdr">
        <i class="ti ti-message-circle"></i>
        <span class="comment-hdr-lbl">הערות למנהלת</span>
        ${hasVal?'<span class="comment-saved-badge"><i class="ti ti-check" style="font-size:10px"></i> נשמר</span>':''}
      </div>
      <textarea class="comment-ta" id="ta-${sk}" placeholder="הערות, שינויים, תיקונים..." oninput="comments['${key}']=this.value;document.getElementById('cc-${sk}').textContent=this.value.length+' תווים';">${val}</textarea>
      <div class="comment-ft">
        <span class="comment-cnt" id="cc-${sk}">${val.length} תווים</span>
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="comment-saved-note" id="saved-${sk}"><i class="ti ti-check" style="font-size:12px;color:#065f46"></i> נשמר</span>
          <button class="comment-save-btn" onclick="saveComment('${key}',document.getElementById('ta-${sk}').value)">שמור הערה</button>
        </div>
      </div>
    </div>`;
  }
  h+=`</div>`;
  return h;
}

function commentKey(){return current+'-'+activeTab;}
function getDefaultTab(s){return s.tabs[0];}

function renderStage(){
  const s=stages[current];
  if(!activeTab||!s.tabs.includes(activeTab)) activeTab=getDefaultTab(s);

  const totalC=Object.values(comments).filter(v=>v&&v.trim()).length;

  let h=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;">
    <button class="home-btn" onclick="view='dashboard';render()"><i class="ti ti-home"></i> דשבורד</button>
    ${totalC>0?`<button onclick="sendSummary()" style="padding:6px 13px;border-radius:8px;background:#92400e;color:#fff;font-size:12px;border:none;cursor:pointer;">סיכום הערות (${totalC}) ↗</button>`:''}
  </div>`;

  h+=`<div class="stage-nav">`;
  stages.forEach((st,i)=>{
    const allOk=st.tabs.every(t=>approvals[i+'-'+t]);
    const anyCmt=st.tabs.some(t=>comments[i+'-'+t]&&comments[i+'-'+t].trim());
    const icon=allOk?' ✓':anyCmt?' 💬':'';
    h+=`<button class="stage-btn${i===current?' active':''}" onclick="current=${i};activeTab='';render()">${st.num}. ${st.title}${icon}</button>`;
  });
  h+=`</div>`;

  h+=`<div class="progress-bar"><div class="progress-fill" style="width:${(current+1)/stages.length*100}%"></div></div>`;
  h+=`<div class="stage-header"><div class="stage-badge">${s.num}</div><div class="stage-title">${s.title}</div></div>`;
  h+=`<div class="stage-desc">${s.desc}</div>`;

  if(s.tabs.length>1){
    h+=`<div class="tabs">`;
    s.tabs.forEach(t=>{
      const labels={yes:'מתקדם ✓',no:'לא מתקדם ✗',auto:'מייל אוטומטי'};
      const dots={yes:'dot-yes',no:'dot-no',auto:'dot-auto'};
      h+=`<button class="tab${activeTab===t?' active':''}" onclick="activeTab='${t}';render()"><span class="tab-dot ${dots[t]}"></span>${labels[t]}</button>`;
    });
    h+=`</div>`;
  }

  let mail=null;
  if(activeTab==='auto'&&s.auto){h+=`<div class="auto-badge"><i class="ti ti-bolt"></i> נשלח אוטומטית עם הרישום</div>`;mail=s.auto;}
  else if(activeTab==='yes') mail=s.yes;
  else if(activeTab==='no') mail=s.no;

  if(mail){
    h+=`<div class="email-card"><div class="email-header"><div class="email-from">מאת: צוות שפה אחת ו-Do.ability &lt;can_do@safa1.co.il&gt;</div><div class="email-subject">נושא: ${mail.subject}</div></div><div class="email-body">${mail.body}</div></div>`;
    h+=actionBlock(commentKey());
  }

  if(s.reminders&&activeTab==='yes'){
    h+=`<div style="margin-top:1.25rem;"><div style="font-size:13px;font-weight:600;color:#6b7280;margin-bottom:8px;">תזכורות (למי שטרם הגיש)</div><div class="reminder-list">`;
    s.reminders.forEach((r,i)=>{
      const rKey=current+'-r'+i;
      const isOpen=!!openReminders[rKey];
      const rApproved=approvals[rKey];
      const rComment=comments[rKey]&&comments[rKey].trim();
      h+=`<div class="reminder-item">
        <button class="reminder-toggle${isOpen?' open':''}" onclick="openReminders['${rKey}']=!openReminders['${rKey}'];render()">
          <span><span class="rtag tag-${r.tag}">${r.tag==='urgent'?'דחוף':r.tag==='warn'?'אזהרה':'מידע'}</span>${r.label}${rApproved?' ✓':rComment?' 💬':''}</span>
          <i class="ti ti-chevron-down"></i>
        </button>
        <div class="reminder-body${isOpen?' show':''}">
          <div style="font-size:12px;color:#6b7280;margin-bottom:8px;font-weight:600;">נושא: ${r.subject}</div>
          ${r.body}
          ${actionBlock(rKey)}
        </div>
      </div>`;
    });
    h+=`</div></div>`;
  }

  h+=`<div class="nav-footer">
    <button class="nav-btn" onclick="if(current>0){current--;activeTab='';render();}else{view='dashboard';render();}" ${current===0?'style="visibility:hidden"':''}><i class="ti ti-arrow-right"></i> הקודם</button>
    <button class="nav-btn primary" onclick="checkAndGoNext()">${current===stages.length-1?'סיום וחזרה לדשבורד <i class=\"ti ti-home\"></i>':'הבא <i class=\"ti ti-arrow-left\"></i>'}</button>
  </div>`;

  document.getElementById('app').innerHTML=h;
}

function render(){
  if(view==='dashboard') renderDashboard();
  else renderStage();
}
render();
</script>
</body>
</html>
