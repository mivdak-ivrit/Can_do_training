<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">

<title>Workflow הכשרת מסוגלות 2026</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:#f4f5f7;min-height:100vh;direction:rtl;}
.wrap{max-width:680px;margin:0 auto;padding:24px 16px 48px;}
.home-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border:1px solid #d1d5db;border-radius:8px;background:#fff;color:#6b7280;font-size:13px;cursor:pointer;margin-bottom:1.25rem;}
.home-btn:hover{background:#f9fafb;}
.stage-nav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem;}
.stage-btn{padding:6px 12px;border-radius:8px;border:1px solid #d1d5db;background:#fff;color:#6b7280;font-size:12px;cursor:pointer;transition:all 0.15s;}
.stage-btn.active{background:#0E7C7B;color:#fff;border-color:#0E7C7B;}
.stage-btn:hover:not(.active){background:#f3f4f6;}
.stage-header{display:flex;align-items:center;gap:12px;margin-bottom:1rem;}
.stage-badge{width:32px;height:32px;border-radius:50%;background:#d1fae5;color:#065f46;font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.stage-title{font-size:18px;font-weight:600;color:#111827;}
.stage-desc{font-size:13px;color:#6b7280;margin-bottom:1.25rem;padding:10px 14px;background:#f9fafb;border-radius:0 8px 8px 0;border-right:3px solid #0E7C7B;}
.auto-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:8px;background:#d1fae5;color:#065f46;font-size:11px;font-weight:600;margin-bottom:10px;}
.tabs{display:flex;margin-bottom:1rem;border:1px solid #d1d5db;border-radius:8px;overflow:hidden;}
.tab{flex:1;padding:9px 10px;text-align:center;font-size:13px;font-weight:500;cursor:pointer;background:#fff;color:#6b7280;border:none;display:flex;align-items:center;justify-content:center;gap:6px;}
.tab.active{background:#0E7C7B;color:#fff;}
.tab:first-child{border-radius:8px 0 0 8px;}
.tab:last-child{border-radius:0 8px 8px 8px;}
.tab-dot{width:8px;height:8px;border-radius:50%;}
.dot-yes{background:#34d399;}.dot-no{background:#fb923c;}.dot-auto{background:#6ee7b7;}
.tab.active .tab-dot{background:#ffffff88;}
.email-card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;overflow:hidden;margin-bottom:1rem;}
.email-header{background:#0E7C7B;padding:18px 22px;direction:rtl;text-align:right;}
.email-from{font-size:11px;color:#ffffff99;margin-bottom:4px;}
.email-subject{font-size:15px;font-weight:600;color:#fff;}
.email-body{padding:22px;direction:rtl;text-align:right;font-size:14px;line-height:1.8;color:#1f2937;}
.email-body p{margin-bottom:14px;}
.email-body p:last-child{margin-bottom:0;}
.email-sig{color:#6b7280;font-size:13px;}
.email-hl{background:#eef6f6;border-right:3px solid #0E7C7B;padding:12px 14px;margin:12px 0;font-size:14px;line-height:1.8;}
.email-box{background:#f0f9f9;border-radius:8px;padding:14px 16px;margin:12px 0;font-size:14px;}
.email-box-title{color:#0E7C7B;font-size:14px;font-weight:600;margin-bottom:8px;}
.email-steps{display:flex;flex-direction:column;gap:6px;}
.email-step{color:#1f2937;font-size:14px;line-height:1.6;}
.email-step strong{color:#0E7C7B;}
.email-rm{background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:14px 16px;margin:12px 0;}
.email-rm-title{font-size:14px;font-weight:600;color:#1f2937;margin-bottom:10px;}
.email-rm-note{color:#9ca3af;font-size:12px;border-top:1px solid #e5e7eb;padding-top:8px;margin-top:8px;line-height:1.6;}
.dates-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px 14px;margin:8px 0;}
.date-item{font-size:13px;color:#6b7280;}
.date-item strong{color:#0E7C7B;}
.dates-note{font-size:12px;color:#9ca3af;border-top:1px solid #e5e7eb;padding-top:8px;margin-top:8px;}
.pay-btn{display:inline-block;padding:9px 20px;background:#0E7C7B;color:#fff;font-size:14px;font-weight:600;text-decoration:none;border-radius:8px;margin-top:10px;}
.progress-bar{height:3px;background:#e5e7eb;border-radius:2px;margin-bottom:1.25rem;overflow:hidden;}
.progress-fill{height:100%;background:#0E7C7B;border-radius:2px;transition:width 0.3s;}
.nav-footer{display:flex;justify-content:space-between;margin-top:1.5rem;}
.nav-btn{padding:8px 18px;border:1px solid #d1d5db;border-radius:8px;background:#fff;color:#6b7280;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;}
.nav-btn:hover{background:#f3f4f6;}
.nav-btn.primary{background:#0E7C7B;color:#fff;border-color:#0E7C7B;}
.nav-btn.primary:hover{background:#0a6665;}
.action-area{margin-top:10px;display:flex;flex-direction:column;gap:8px;}
.action-toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;direction:rtl;}
.tool-btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:8px;border:1px solid #d1d5db;background:#fff;color:#374151;font-size:12px;font-weight:500;cursor:pointer;transition:all 0.15s;}
.tool-btn:hover{background:#f3f4f6;border-color:#9ca3af;}
.tool-btn.save-btn{background:#0E7C7B;color:#fff;border-color:#0E7C7B;}
.tool-btn.save-btn:hover{background:#0a6665;}
.tool-btn.reset-btn{color:#991b1b;border-color:#fca5a5;}
.checks-row{display:flex;gap:16px;direction:rtl;align-items:center;padding:8px 12px;background:#f9fafb;border-radius:8px;border:1px solid #e5e7eb;}
.check-label{display:flex;align-items:center;gap:6px;font-size:13px;color:#374151;cursor:pointer;user-select:none;}
.check-label input[type=checkbox]{width:15px;height:15px;accent-color:#0E7C7B;cursor:pointer;}
.email-editor{width:100%;min-height:220px;padding:22px;border:2px solid #fcd34d;border-radius:0 0 12px 12px;font-size:14px;line-height:1.8;color:#1f2937;direction:rtl;text-align:right;font-family:Arial,sans-serif;resize:vertical;background:#fffbeb;}
.email-editor:focus{outline:none;}
.reminder-list{display:flex;flex-direction:column;gap:8px;margin-top:1rem;}
.reminder-item{background:#fff;border:1px solid #e5e7eb;border-radius:8px;overflow:hidden;}
.reminder-toggle{width:100%;padding:11px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;background:none;border:none;font-size:13px;font-weight:500;color:#1f2937;direction:rtl;text-align:right;}
.reminder-toggle .ti-chevron-down{transition:transform 0.2s;color:#9ca3af;}
.reminder-toggle.open .ti-chevron-down{transform:rotate(180deg);}
.reminder-body{padding:14px;direction:rtl;text-align:right;font-size:13px;line-height:1.75;color:#1f2937;border-top:1px solid #e5e7eb;display:none;}
.reminder-body.show{display:block;}
.reminder-body p{margin-bottom:10px;}
.reminder-body p:last-child{margin-bottom:0;}
.rtag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;margin-left:7px;}
.tag-info{background:#d1fae5;color:#065f46;}.tag-warn{background:#fef3c7;color:#92400e;}.tag-urgent{background:#fee2e2;color:#991b1b;}
.dash-title{font-size:20px;font-weight:700;color:#111827;margin-bottom:4px;}
.dash-sub{font-size:13px;color:#6b7280;margin-bottom:1.25rem;}
.dash-list{display:flex;flex-direction:column;gap:8px;}
.dash-card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;overflow:hidden;}
.dash-card-hdr{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;cursor:pointer;}
.dash-card-left{display:flex;align-items:center;gap:10px;}
.dash-num{width:26px;height:26px;border-radius:50%;background:#d1fae5;color:#065f46;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.dash-name{font-size:14px;font-weight:600;color:#111827;}
.pills{display:flex;gap:5px;flex-wrap:wrap;}
.pill{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;}
.pill-full{background:#d1fae5;color:#065f46;}.pill-part{background:#e0f2fe;color:#0369a1;}.pill-pend{background:#f3f4f6;color:#9ca3af;border:1px solid #e5e7eb;}
.dash-card-body{padding:0 16px 12px;display:none;}
.dash-card-body.open{display:block;}
.dash-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-top:1px solid #f3f4f6;font-size:13px;color:#6b7280;}
.dash-row:first-child{border-top:none;}
.dash-go{padding:4px 12px;border-radius:7px;background:#0E7C7B;color:#fff;font-size:11px;border:none;cursor:pointer;cursor:pointer;}
.dash-go:hover{background:#0a6665;}
</style>
</head>

window._stages = [
  {num:1,title:"רישום ראשוני",desc:"70 נרשמו · מייל אוטומטי לכולם · 15 לא רלוונטיים מקבלים מייל ידני",tabs:['auto','no'],
    auto:{subject:"תודה רבה על התעניינותכם בהכשרת המנחים של Do.ability ושפה1",body:`<p>תודה רבה על התעניינותכם בהכשרת המנחים של Do.ability ושפה1 מטעם משרד העבודה והג'וינט.</p><p>נתוניך התקבלו במערכת.</p><div class="email-hl">מכיוון שמספר המקומות בכל הכשרה מוגבל, ייעשה תעדוף לטובת מועמדים עם פוטנציאל להשתלב בפיתוח והובלת תהליכים לטווח הארוך.</div><p>בכל שאלה ועניין: <strong style="color:#0E7C7B;">can_do@safa1.co.il</strong></p><p>אם טרם הצטרפתם לקהילת הווטסאפ שלנו, מוזמנים להצטרף <strong style="color:#0E7C7B;">כאן</strong>!</p><p class="email-sig">נהיה בקשר בהקדם,<br>צוות שפה 1 וצוות Do.ability</p>`},
    no:{subject:"לגבי הרישום שלכם – הכשרת מנחים",body:`<p>שלום ותודה לך על התעניינותך בהכשרת המנחים בגישת המסוגלות.</p><p>לאור הקריטריונים שהוגדרו להכשרת מנחים עבור גישת המסוגלות בהכנה לתעסוקה בחברה הערבית לא נמצאת זכאי להכשרה מקצועית על חשבון משרד העבודה</p><p>בשל כך, ההשתתפות במחזור זה רלוונטית למועמדים הזכאים בהתאם למדיניות משרד העבודה.</p><p>נשמח לעדכן אותך בהמשך לגבי הכשרות עתידיות.</p><p class="email-sig">בברכה,<br>צוות ההכשרה ושפה אחת</p>`},
    reminders:null},
  {num:2,title:"משימת השתלבות",desc:"55 רלוונטיים · 32 הגישו, 23 לא הגישו · 4 תזכורות עד 14.6",tabs:['yes','no'],
    yes:{subject:"הכשרת מסוגלות 2026 – יצאתם לדרך, הנה השלב הראשון",body:`<p>שלום,</p><p>תודה שנרשמתם! השלב הראשון הוא משימת פתיחה קצרה במערכת <strong style="color:#0E7C7B;">Canbee</strong>.</p><p>שלחנו מייל נפרד עם <strong>פרטי הכניסה</strong>. אם לא קיבלתם — בדקו בספאם, או השיבו למייל הזה.</p><div class="email-box"><div class="email-box-title">איך ניגשים למשימה?</div><div class="email-steps"><div class="email-step"><strong>1.</strong> היכנסו למערכת עם פרטי הכניסה שקיבלתם.</div><div class="email-step"><strong>2.</strong> היכנסו לקורס <strong>״הכשרת קיץ 2026״</strong>.</div><div class="email-step"><strong>3.</strong> פתחו את היחידה <strong>״היכרות״</strong> ועקבו אחר ההוראות.</div></div></div><div class="email-hl"><strong style="color:#0E7C7B;">כדאי להזדרז:</strong> תינתן עדיפות למגישים מוקדם.</div><p class="email-sig">בהצלחה!<br>צוות שפה אחת ו- Do.ability</p>`},
    no:{subject:"עדכון לגבי מועמדותכם – הכשרת מנחים",body:`<p>שלום,</p><p>תודה לך על מטלת ההשתלבות ששלחת! צפינו בעניין רב. בשלב זה אנחנו מתעדפים מועמדים שיוכלו להשתלב גם בפיתוח תוכן.</p><p>נשמח לעדכן אותך לגבי הכשרות עתידיות.</p><p class="email-sig">בברכה,<br>צוות ההכשרה ושפה אחת</p>`},
    reminders:[
      {tag:"info",label:"תזכורת 1 – יום לאחר מייל המשימה",subject:"תזכורת: משימת ההשתלבות | קיץ 2026",body:`<p>שלום רב,</p><p>בימים האחרונים שלחנו מייל עם הנחיות לביצוע משימה באתר Canbee. אם לא קיבלתם — בדקו בספאם.</p><p>המשימה יש להגיש עד <strong>14.6.26</strong>.</p><p class="email-sig">בברכה,<br>צוות שפה אחת</p>`},
      {tag:"warn",label:"תזכורת 2 – מספר ימים לאחר המשימה",subject:"תזכורת: השלמת משימת ההשתלבות",body:`<p>שלום רב,</p><p>אם עדיין לא השלמתם את משימת ההשתלבות, זה הזמן. מועד אחרון: <strong>14.6.26</strong>.</p><p class="email-sig">בברכה,<br>צוות שפה אחת</p>`},
      {tag:"warn",label:"תזכורת 3 – חמישי 11.6",subject:"תזכורת: יום ראשון הוא המועד האחרון",body:`<p>שלום רב,</p><p>יום ראשון <strong>14.6.26</strong> הוא המועד האחרון. סוף השבוע הוא הזדמנות טובה לסיים.</p><p class="email-sig">בברכה,<br>צוות שפה אחת</p>`},
      {tag:"urgent",label:"ביום האחרון – 14.6",subject:"הזדמנות אחרונה – המשימה נסגרת היום",body:`<p>שלום רב,</p><p>היום <strong>14.6.26</strong> הוא המועד האחרון. מי שלא יגיש לא יוכל להמשיך בתהליך.</p><p class="email-sig">בברכה,<br>צוות שפה אחת</p>`}
    ]},
  {num:3,title:"זימון לראיון",desc:"32 הגישו מטלה · 22 זומנו · 8 לא מתאימים, 2 לבדיקה",tabs:['yes','no'],
    yes:{subject:"השתבצות לראיון עם צוות ההכשרה",body:`<p>שלום רב,</p><p>שמחים מאוד על הצטרפותך לתהליך ההרשמה לקורס הכשרת מנחים בגישת המסוגלות.</p><p>נהנינו לצפות בסרטון שלך, ומצפים לפגוש אותך באופן אישי.</p><div class="email-hl">אנא בחר/י מועד שנוח לך לראיון בקישור הבא:<br><br><a href="https://calendly.com/do-ability-beelango/meet-with-me" style="color:#0E7C7B;font-weight:600;">https://calendly.com/do-ability-beelango/meet-with-me</a></div><p>לכל שאלה: <strong style="color:#0E7C7B;">can_do@safa1.co.il</strong></p><p class="email-sig">בברכה,<br>צוות שפה 1 ו- Do.ability</p>`},
    no:{subject:"עדכון לגבי מועמדותכם – הכשרת מנחים",body:`<p>שלום,</p><p>תודה לך על מטלת ההשתלבות ששלחת! צפינו בעניין רב. בשלב זה אנחנו מתעדפים מועמדים שיוכלו להשתלב גם בפיתוח תוכן.</p><p>נשמח לעדכן אותך לגבי הכשרות עתידיות.</p><p class="email-sig">בברכה,<br>צוות ההכשרה ושפה אחת</p>`},
    reminders:null},

    </div>
  </div>`;
  modal.addEventListener('click',e=>{ if(e.target===modal) modal.remove(); });

window.doDownload = function(key){
  const parts=key.split('-');
  const si=parseInt(parts[0]);
  const t=parts.slice(1).join('-');
  const s=_stages[si];
  let mail=null;
  if(t.startsWith('r')){ mail=s.reminders[parseInt(t.slice(1))]; }
  else if(t==='auto') mail=s.auto;
  else if(t==='yes') mail=s.yes;

function saveToFirebase(){ window._fbSave && window._fbSave(); }

// ── Render helpers ──
function mailBody(key, mail){
  return _state.edits[key]!==undefined ? _state.edits[key] : mail.body;
}
function getChecks(key){ return _state.checks[key]||{brevo:false,auto:false}; }

function actionBlock(key, mail){
  const isEditing = _state.editingKey===key;
  const hasEdit = _state.edits[key]!==undefined;
  const c = getChecks(key);
  const currentBody = mailBody(key, mail);

  let h=`<div class="action-area"><div class="action-toolbar">`;
  if(isEditing){
    h+=`<button class="tool-btn save-btn" onclick="saveEdit('${key}')"><i class="ti ti-device-floppy"></i> שמור</button>`;
    h+=`<button class="tool-btn" onclick="cancelEdit()"><i class="ti ti-x"></i> בטל</button>`;
  } else {
    h+=`<button class="tool-btn" onclick="startEdit('${key}')"><i class="ti ti-pencil"></i> ערוך מייל</button>`;
    h+=`<button class="tool-btn" onclick="doDownload('${key}')"><i class="ti ti-download"></i> הורד HTML</button>`;
    h+=`<button class="tool-btn" onclick="showHTML('${key}')"><i class="ti ti-code"></i> הצג קוד HTML</button>`;
    if(hasEdit) h+=`<button class="tool-btn reset-btn" onclick="resetEdit('${key}')"><i class="ti ti-rotate"></i> אפס</button>`;
  }
  h+=`</div>`;
  h+=`<div class="checks-row">
    <label class="check-label"><input type="checkbox" ${c.brevo?'checked':''} onchange="toggleCheck('${key}','brevo')"> נמצא ב-BREVO</label>
    <label class="check-label"><input type="checkbox" ${c.auto?'checked':''} onchange="toggleCheck('${key}','auto')"> יש אוטומציה</label>
  </div>`;
  if(isEditing){
    h+=`<textarea class="email-editor" id="editor-${key}">${currentBody}</textarea>`;
  }
  h+=`</div>`;
  return h;
}

function mailCard(key, mail){
  return `<div class="email-card">
    <div class="email-header">
      <div class="email-from">מאת: צוות שפה אחת ו-Do.ability &lt;can_do@safa1.co.il&gt;</div>
      <div class="email-subject">נושא: ${mail.subject}</div>
    </div>
    <div class="email-body">${mailBody(key,mail)}</div>
  </div>`;
}

function renderDashboard(){
  let h=`<div class="dash-title">Workflow הכשרת מסוגלות 2026</div>
  <div class="dash-sub">לחצו על שלב לפירוט · לחצו "עבור למייל" לעריכה</div>
  <div class="dash-list">`;
  _stages.forEach((s,si)=>{
    h+=`<div class="dash-card">
      <div class="dash-card-hdr" onclick="toggleDash(${si})">
        <div class="dash-card-left"><div class="dash-num">${s.num}</div><div class="dash-name">${s.title}</div></div>
        <div class="pills">`;
    s.tabs.forEach(t=>{
      const c=getChecks(si+'-'+t);
      const lbl={yes:'מתקדם',no:'לא מתקדם',auto:'אוטומטי'}[t];
      if(c.brevo&&c.auto) h+=`<span class="pill pill-full">✓ ${lbl}</span>`;
      else if(c.brevo||c.auto) h+=`<span class="pill pill-part">~ ${lbl}</span>`;
      else h+=`<span class="pill pill-pend">${lbl}</span>`;
    });
    const open=!!_state.dashOpen[si];
    h+=`</div></div>
      <div class="dash-card-body${open?' open':''}" id="db${si}">`;
    s.tabs.forEach(t=>{
      const c=getChecks(si+'-'+t);
      const lbl={yes:'מייל מתקדם',no:'מייל לא מתקדם',auto:'מייל אוטומטי'}[t];
      const parts=[]; if(c.brevo) parts.push('BREVO ✓'); if(c.auto) parts.push('אוטומציה ✓');
      const stTxt=parts.length?parts.join(' · '):'טרם הוגדר';
      const stColor=parts.length?'#065f46':'#9ca3af';
      h+=`<div class="dash-row"><span>${lbl} — <span style="color:${stColor}">${stTxt}</span></span><button class="dash-go" onclick="goStage(${si},'${t}')">עבור למייל</button></div>`;
    });
    h+=`</div></div>`;
  });
  h+=`</div>`;
  document.getElementById('app').innerHTML=h;
}

function renderStage(){
  const st=_state;
  const s=_stages[st.current];
  if(!st.activeTab||!s.tabs.includes(st.activeTab)) st.activeTab=s.tabs[0];

  let h=`<div style="margin-bottom:1.25rem;"><button class="home-btn" onclick="goDashboard()"><i class="ti ti-home"></i> דשבורד</button></div>`;
  h+=`<div class="stage-nav">`;
  _stages.forEach((sg,i)=>{
    h+=`<button class="stage-btn${i===st.current?' active':''}" onclick="goStage(${i})">${sg.num}. ${sg.title}</button>`;
  });
  h+=`</div>`;
  h+=`<div class="progress-bar"><div class="progress-fill" style="width:${(st.current+1)/_stages.length*100}%"></div></div>`;
  h+=`<div class="stage-header"><div class="stage-badge">${s.num}</div><div class="stage-title">${s.title}</div></div>`;
  h+=`<div class="stage-desc">${s.desc}</div>`;

  if(s.tabs.length>1){
    h+=`<div class="tabs">`;
    s.tabs.forEach(t=>{
      const labels={yes:'מתקדם ✓',no:'לא מתקדם ✗',auto:'מייל אוטומטי'};
      const dots={yes:'dot-yes',no:'dot-no',auto:'dot-auto'};
      h+=`<button class="tab${st.activeTab===t?' active':''}" onclick="setTab('${t}')"><span class="tab-dot ${dots[t]}"></span>${labels[t]}</button>`;
    });
    h+=`</div>`;
  }

  let mail=null;
  if(st.activeTab==='auto'&&s.auto){h+=`<div class="auto-badge"><i class="ti ti-bolt"></i> נשלח אוטומטית עם הרישום</div>`;mail=s.auto;}
  else if(st.activeTab==='yes') mail=s.yes;
  else if(st.activeTab==='no') mail=s.no;

  if(mail){
    const key=st.current+'-'+st.activeTab;
    h+=mailCard(key,mail);
    h+=actionBlock(key,mail);
  }

  if(s.reminders&&st.activeTab==='yes'){
    h+=`<div style="margin-top:1.25rem;"><div style="font-size:13px;font-weight:600;color:#6b7280;margin-bottom:8px;">תזכורות (למי שטרם הגיש)</div><div class="reminder-list">`;
    s.reminders.forEach((r,i)=>{
      const rKey=st.current+'-r'+i;
      const isOpen=!!st.openReminders[rKey];
      h+=`<div class="reminder-item">
        <button class="reminder-toggle${isOpen?' open':''}" onclick="toggleReminder('${rKey}')">
          <span><span class="rtag tag-${r.tag}">${r.tag==='urgent'?'דחוף':r.tag==='warn'?'אזהרה':'מידע'}</span>${r.label}</span>
          <i class="ti ti-chevron-down"></i>
        </button>
        <div class="reminder-body${isOpen?' show':''}">
          <div style="font-size:12px;color:#6b7280;margin-bottom:8px;font-weight:600;">נושא: ${r.subject}</div>
          ${mailCard(rKey,r)}
          ${actionBlock(rKey,r)}
        </div>
      </div>`;
    });
    h+=`</div></div>`;
  }

  h+=`<div class="nav-footer">
    <button class="nav-btn" onclick="navPrev()" ${st.current===0?'style="visibility:hidden"':''}><i class="ti ti-arrow-right"></i> הקודם</button>
    <button class="nav-btn primary" onclick="navNext()">${st.current===_stages.length-1?'סיום וחזרה לדשבורד <i class="ti ti-home"></i>':'הבא <i class="ti ti-arrow-left"></i>'}</button>
  </div>`;

  document.getElementById('app').innerHTML=h;
}

window.render = function(){
  if(_state.view==='dashboard') renderDashboard();
  else renderStage();
};

render();
</script>

const app = initializeApp({ databaseURL: "https://can-do-workflow-default-rtdb.europe-west1.firebasedatabase.app/" });
const db = getDatabase(app);
const dataRef = ref(db, 'workflow');

window._fbSave = function(){
  set(dataRef, {
    edits: {..._state.edits},
    checks: {..._state.checks},
    lastUpdated: new Date().toISOString()
  });
};

onValue(dataRef, (snapshot) => {
  const data = snapshot.val() || {};
  Object.keys(_state.edits).forEach(k=>delete _state.edits[k]);
  Object.keys(_state.checks).forEach(k=>delete _state.checks[k]);
  if(data.edits) Object.assign(_state.edits, data.edits);
  if(data.checks) Object.assign(_state.checks, data.checks);
  render();
});
</script>
</body>
</html>
